<!doctype html>
<html lang="zh">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>秋风的小站</title>
    <meta name="description" content="秋风的个人小站 — 分享兴趣与笔记。" />
    <meta name="theme-color" content="#49b1f5" />
    <link rel="icon" href="https://norespond.github.io/picx-images-hosting/cover/favicon-.58hq3jeb3k.ico" />
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <!-- Open Graph / Twitter -->
    <meta property="og:title" content="秋风的小站" />
    <meta property="og:description" content="秋风的个人小站 — 分享兴趣与笔记。" />
    <meta property="og:image" content="./assets/images/avatar.png" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.xuehdxz.dpdns.org/" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="canonical" href="https://www.xuehdxz.dpdns.org/" />

    <!-- Safe default config to avoid runtime errors when scripts/Alpine evaluate before
         the real config.json is fetched. This creates minimal shape only if window.config
         or window.config.content is not already defined. It will NOT overwrite a loaded config. -->
    <script>
        (function () {
            window.config = window.config || {};
            if (!window.config.content) {
                window.config.content = {
                    title: document.title || '秋风的小站',
                    theme: {
                        displayName: '默认',
                        theme: '',
                        colors: {
                            default: '',
                            autoSwitch: { dark: '', light: '' },
                            enable: [],
                            list: {},
                            index: []
                        }
                    },
                    masterInfo: {
                        name: '秋风',
                        website: '#',
                        avatar: './assets/images/avatar.png',
                        socialLink: { enable: [], icon: {}, link: {} }
                    },
                    pageHead: { typedContent: [] },
                    icp: { enable: [], info: { code: {}, link: {} } }
                };
            }
        })();
    </script>

    <link rel="stylesheet" href="./assets/styles/loaders.css" />
    <iframe id="global-loader-iframe" src="./loaders/global.html"></iframe>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <!-- 推荐使用 CDN 方式加载 -->
    <!-- Localized vendor libraries (fallbacks) -->
    <script defer src="./assets/vendor/sweetalert.min.js"></script>
    <script defer src="./assets/vendor/typed.min.js"></script>
    <script defer src="./assets/vendor/markdown-it.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.15.2/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="./assets/styles/elements.css" />
    <link rel="stylesheet" href="./assets/styles/index.css" />
    <link rel="stylesheet" href="./assets/styles/responsive/index.css" />
    <link rel="stylesheet" href="./image/img.css" />
    <link rel="stylesheet" href="./music/music.css" />

    <script defer src="./assets/scripts/utils.js"></script>
    <script defer src="./assets/scripts/theme-loader.js"></script>
    <script defer src="./assets/scripts/gallery.js"></script>
    <script defer src="./assets/scripts/music-page.js"></script>
    <script defer src="./assets/scripts/index.js"></script>

    <script defer src="https://cdn.jsdelivr.net/npm/aplayer@1.10.1/dist/APlayer.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/aplayer@1.10.1/dist/APlayer.min.css" rel="stylesheet">
    <script defer src="./assets/scripts/music.js"></script>
    <theme></theme>
</head>

<body x-data="">
    <a class="skip-link" href="#main-content">跳转到主要内容</a>
    <div class="page-head">
        <span class="title"></span>
    </div>

    <main id="main-content" class="primary-container" tabindex="-1">
        <div class="left-area">
            <div class="cards">
                <div class="card-item" id="personal-info">
                    <!-- 使用标准 img，JS 在配置加载后设置 src -->
                    <img class="avatar" id="avatar-img" alt="秋风的头像" src="./assets/images/avatar.png" loading="lazy"
                        decoding="async" />
                    <span class="name" x-text="config.content.masterInfo.name">Loading...</span>
                    <div class="social-icons">Loading...</div>
                </div>
                <div class="card-item" id="recommend">
                    <span class="title"><i class="fa-solid fa-bullhorn"></i>公告</span>
                    <div class="content">
                        <div class="markdown-content" src="./assets/markdown/announcement.md"></div>
                    </div>
                </div>
                <div class="card-item" id="hitokoto">
                    <span class="title"><i class="fa-solid fa-scroll"></i>一言</span>
                    <div class="content">
                        <a id="hitokoto-text" href="" target="_blank">Loading...</a>
                    </div>
                </div>
                <div class="card-item" id="gallery-entry">
                    <span class="title"><i class="fa-solid fa-bookmark"></i>收藏</span>
                    <div class="content gallery-entry-content">
                        <p class="gallery-entry-note">图片和歌单都放在这里，点一下就能进入。</p>
                        <div class="gallery-entry-actions">
                            <button type="button" class="gallery-entry-button gallery-entry-button--gallery"
                                data-page-action="open-gallery">
                                <span class="gallery-entry-button-icon" aria-hidden="true">
                                    <i class="fa-solid fa-images"></i>
                                </span>
                                <span>图集</span>
                            </button>
                            <button type="button" class="gallery-entry-button gallery-entry-button--music"
                                data-page-action="open-music">
                                <span class="gallery-entry-button-icon" aria-hidden="true">
                                    <i class="fa-solid fa-music"></i>
                                </span>
                                <span>音乐</span>
                            </button>
                        </div>
                    </div>
                </div>
                <!-- aplayer播放器 -->
                <div id="aplayer"></div>
                <div class="card-item" id="settings">
                    <span class="title"><i class="fa-solid fa-sliders"></i>浏览设置</span>
                    <div class="content">
                        <div class="settings-item theme-settings">
                            <span class="title"><i class="fa-solid fa-shirt"></i>配色方案 · <span
                                    x-text="config.content.theme.displayName"></span></span>
                            <div class="themes"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="right-area">
            <div class="content-page">
                <div class="markdown-content" src="./assets/markdown/content-page.md"></div>
                <div class="markdown-content" src="./assets/markdown/about.md"></div>
                <div class="markdown-content" src="./assets/markdown/vpns.md"></div>
                <div class="markdown-content" src="./n3/st.md"></div>
            </div>
        </div>
    </main>

    <script defer src="./live2d/dist/autoload.js"></script>

    <div class="footer">
        <span class="icp-info">Loading...</span>
        <span class="line-break"><i class="fa-solid fa-ellipsis"></i></span>
        <!-- 球球你别改这里可以嘛呜呜呜 (＞﹏＜) -->
        <!-- “[Loading...]”的实际内容可以在 config.json 的 masterInfo.info 项中修改哦~ -->
        <span>本站由 <span class="webmaster-info"><a :href="config.content.masterInfo.website" target="_blank"
                    rel="noopener noreferrer" x-text="config.content.masterInfo.name">[Loading...]</a> 和 </span><a
                href="https://hic.top" target="_blank" rel="noopener noreferrer">成成0v0</a> 用 <i
                class="fa-solid fa-heart"></i> 制作</span>

        <span>Powered by <a href="https://github.com/ChengCheng0v0/ACG-Home" target="_blank"
                rel="noopener noreferrer">ACG-Home</a></span>
    </div>
    <button type="button" class="back-to-top" id="back-to-top" aria-label="返回顶部">
        <i class="fa-solid fa-arrow-up" aria-hidden="true"></i>
    </button>
    <iframe id="theme-color-loader-iframe" src="./loaders/theme-color.html"></iframe>

    <script>
        (function () {
            // 隐藏滚动条
            document.body.style.overflow = "hidden";

            // 最少展示多久，避免闪一下就消失
            const minimumLoadingTime = 1800;
            // 最长等待多久，防止 CDN/外链卡住后页面一直停在 loading
            const maximumLoadingTime = 8000;
            const startTime = performance.now();
            let loaderFinished = false;

            function finishLoader() {
                if (loaderFinished) return;
                loaderFinished = true;

                const loader = document.getElementById("global-loader-iframe");
                if (loader) {
                    loader.className = "end";
                }
                document.body.style.overflow = "unset";
            }

            function finishWhenReady() {
                const elapsedTime = performance.now() - startTime;
                const delay = Math.max(0, minimumLoadingTime - elapsedTime);
                window.setTimeout(finishLoader, delay);
            }

            // 页面加载完成后，按最短时间退场
            window.addEventListener("load", finishWhenReady, { once: true });

            // 兜底：如果某个外链一直不返回，至少别把页面锁死在加载页
            window.setTimeout(finishLoader, maximumLoadingTime);
        })();
    </script>
</body>

</html>
